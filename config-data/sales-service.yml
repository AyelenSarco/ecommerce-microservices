spring:
  application:
    name: sales-service

  datasource:
    url: ${SALES_SERVICE_DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.MySQLDialect
    
  cloud:
    openfeign:
      okhttp:
        enabled: true

server:
  port: 8091

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}

feign:
  okhttp:
    enabled: true

